name: E2E Unit Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  schedule:
    # Run nightly at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BUILD_DIR: build-test
  CMAKE_BUILD_PARALLEL_LEVEL: 4
  PYTEST_TIMEOUT: 120

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: Build the complete C++ test suite
  # ─────────────────────────────────────────────────────────────
  build-cpp-tests:
    name: Build C++ Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake build-essential ninja-build \
            libeigen3-dev libopenblas-dev

      - name: Install PyTorch (CPU)
        run: |
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Resolve Torch CMake prefix path
        id: torch-path
        run: |
          TORCH_CMAKE=$(python -c "import torch; print(torch.utils.cmake_prefix_path)")
          echo "cmake_prefix=$TORCH_CMAKE" >> "$GITHUB_OUTPUT"

      - name: Configure CMake (Release with debug info for useful stack traces)
        run: |
          cmake -S aten/src/ATen/atomspace \
                -B $BUILD_DIR \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=RelWithDebInfo \
                -DCMAKE_PREFIX_PATH="${{ steps.torch-path.outputs.cmake_prefix }}" \
                -DBUILD_PYTHON_BINDINGS=OFF

      - name: Build all test targets
        run: cmake --build $BUILD_DIR --config RelWithDebInfo

      - name: Cache built test binaries
        uses: actions/upload-artifact@v4
        with:
          name: cpp-test-binaries
          path: ${{ env.BUILD_DIR }}/atomspace_test*
          retention-days: 1

  # ─────────────────────────────────────────────────────────────
  # Job 2: Run all C++ unit tests (depends on build job)
  # ─────────────────────────────────────────────────────────────
  cpp-unit-tests:
    name: C++ Unit Tests — ${{ matrix.test_name }}
    needs: build-cpp-tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - test_name: "Core AtomSpace"
            binary: atomspace_test

          - test_name: "Advanced Features (embedding, similarity, serialization)"
            binary: atomspace_test_advanced

          - test_name: "PLN (Probabilistic Logic Networks)"
            binary: atomspace_test_pln

          - test_name: "ECAN (Economic Attention Networks)"
            binary: atomspace_test_ecan

          - test_name: "ECAN Minimal (smoke test)"
            binary: atomspace_test_ecan_minimal

          - test_name: "Cognitive Engine"
            binary: atomspace_test_cognitive

          - test_name: "NLU (Natural Language Understanding)"
            binary: atomspace_test_nlu

          - test_name: "Vision (scene understanding)"
            binary: atomspace_test_vision

          - test_name: "ATenNN (Neural Network integration)"
            binary: atomspace_test_nn

          - test_name: "Model Loader (TorchScript / HuggingFace)"
            binary: atomspace_test_model_loader

          - test_name: "Tokenization (WordPiece / BPE)"
            binary: atomspace_test_tokenization

    steps:
      - name: Download test binaries
        uses: actions/download-artifact@v4.1.3
        with:
          name: cpp-test-binaries
          path: ${{ env.BUILD_DIR }}

      - name: Set up Python (runtime torch shared libraries)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyTorch (CPU) for shared libraries
        run: |
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Make binary executable
        run: chmod +x "$BUILD_DIR/${{ matrix.binary }}"

      - name: Run ${{ matrix.test_name }} tests
        run: |
          cd "$BUILD_DIR"
          echo "=========================================="
          echo "Running: ${{ matrix.test_name }}"
          echo "Binary:  ${{ matrix.binary }}"
          echo "=========================================="
          ./${{ matrix.binary }}
        env:
          LD_LIBRARY_PATH: "${{ env.BUILD_DIR }}${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"

  # ─────────────────────────────────────────────────────────────
  # Job 3: Python package build + Python unit tests
  # ─────────────────────────────────────────────────────────────
  python-unit-tests:
    name: Python Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake build-essential ninja-build

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install pybind11 numpy pytest pytest-timeout

      - name: Build atenspace Python bindings
        run: pip install -e . --no-build-isolation -v

      - name: Verify atenspace import
        run: python -c "import atenspace; print('atenspace loaded successfully')"

      - name: Run Python unit tests
        run: |
          pytest tests/python/test_bindings.py \
            --timeout=${{ env.PYTEST_TIMEOUT }} \
            -v \
            --tb=short \
            --junit-xml=test-results-py${{ matrix.python-version }}.xml

      - name: Upload pytest results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-results-py${{ matrix.python-version }}
          path: test-results-py${{ matrix.python-version }}.xml
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # Job 4: End-to-end integration — Python examples smoke test
  # ─────────────────────────────────────────────────────────────
  python-examples-e2e:
    name: Python Examples E2E Smoke Test
    runs-on: ubuntu-latest
    needs: python-unit-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake build-essential ninja-build

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install pybind11 numpy

      - name: Build atenspace Python bindings
        run: pip install -e . --no-build-isolation -v

      - name: Run basic usage example
        run: python examples/python/basic_usage.py

      - name: Run advanced usage example
        run: python examples/python/advanced_usage.py

      - name: Run neural network integration example
        run: python examples/python/nn_integration.py

  # ─────────────────────────────────────────────────────────────
  # Job 5: Summary gate — all tests must pass
  # ─────────────────────────────────────────────────────────────
  all-tests-passed:
    name: All Tests Passed
    if: always()
    needs:
      - cpp-unit-tests
      - python-unit-tests
      - python-examples-e2e
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Check job results
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more test jobs failed."
            exit 1
          fi
          echo "All test jobs succeeded."
